{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-2xl border border-gray-100 mt-10">
    <div class="text-center mb-8">
        <h2 class="text-3xl font-extrabold text-gray-800">Create Account</h2>
        <p class="text-gray-500 mt-2">Join the most premium job network</p>
    </div>

   <form method="POST" class="space-y-4">
    {% csrf_token %}
    {{ form|crispy }}  <button type="submit" class="...">Sign Up</button>
</form>

    <div class="mt-6 text-center text-sm text-gray-600">
        Already have an account? <a href="#" class="text-blue-600 font-bold hover:underline">Log In</a>
    </div>
</div>
{% endblock %}
