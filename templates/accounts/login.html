{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-2xl border border-gray-100 mt-10">
    <div class="text-center mb-8">
        <h2 class="text-3xl font-extrabold text-gray-800">Welcome Back</h2>
        <p class="text-gray-500 mt-2">Login to your HireHub account</p>
    </div>

    <form method="POST" class="space-y-4">
        {% csrf_token %}
        {{ form|crispy }}
        
        <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition duration-300 transform hover:scale-105 shadow-md">
            Log In
        </button>
    </form>

    <div class="mt-6 text-center text-sm text-gray-600">
        Don't have an account? <a href="{% url 'register' %}" class="text-blue-600 font-bold hover:underline">Sign Up</a>
    </div>
</div>
{% endblock %}
