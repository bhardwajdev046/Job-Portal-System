{% extends 'base.html' %}
{% block content %}
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
    {% for job in jobs %}
    <div class="group relative bg-white dark:bg-slate-800 p-6 rounded-2xl border border-slate-200 dark:border-slate-700 hover:border-blue-500 dark:hover:border-blue-400 transition-all duration-300 hover:shadow-[0_0_30px_-10px_rgba(59,130,246,0.5)]">
        
        <div class="absolute inset-0 bg-gradient-to-br from-blue-500/10 to-transparent opacity-0 group-hover:opacity-100 rounded-2xl transition-opacity"></div>
        
        <div class="relative z-10">
            <h3 class="text-xl font-bold dark:text-white group-hover:text-blue-600 transition-colors">{{ job.title }}</h3>
            <p class="text-slate-500 dark:text-slate-400 mb-4">{{ job.company_name }}</p>
            
            <div class="flex items-center gap-2 mb-4">
                <span class="px-3 py-1 text-xs font-semibold rounded-md bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400">
                    {{ job.job_type }}
                </span>
                <span class="text-xs text-slate-400 italic">{{ job.location }}</span>
            </div>

            <div class="flex justify-between items-center mt-6">
    <span class="text-lg font-bold text-slate-800 dark:text-slate-100">{{ job.salary_range }}</span>
    
    <a href="{% url 'job_detail' job.pk %}" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 px-4 py-2 rounded-lg text-sm font-bold group-hover:bg-blue-600 group-hover:text-white transition-all">
        View Details
    </a>
</div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
