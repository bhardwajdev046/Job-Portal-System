<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <script>
        // Page load hote hi check karega user ki preference
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class', // Isse 'dark' class manual trigger hogi
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0f172a',
                        glowBlue: '#3b82f6',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 dark:bg-darkBg text-slate-900 dark:text-slate-100 transition-colors duration-300">
    
    <nav class="sticky top-0 z-50 backdrop-blur-md bg-white/70 dark:bg-darkBg/70 border-b border-slate-200 dark:border-slate-800">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="/" class="text-2xl font-bold bg-gradient-to-r from-blue-600 to-cyan-500 bg-clip-text text-transparent hover:drop-shadow-[0_0_10px_rgba(59,130,246,0.5)]">
                HireHub
            </a>
            
            <div class="flex items-center space-x-6">
                <button id="theme-toggle" class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 hover:ring-2 ring-blue-500 transition-all">
                    <span id="theme-toggle-dark-icon" class="hidden text-yellow-400">☀️</span>
                    <span id="theme-toggle-light-icon" class="hidden text-slate-600 dark:text-slate-400">🌙</span>
                </button>
                
                {% if user.is_authenticated %}
                    <form action="{% url 'logout' %}" method="post" class="inline">
                        {% csrf_token %}
                        <button type="submit" class="text-sm font-medium text-red-500 hover:text-red-600 transition-all">
                            LOGOUT
                        </button>
                    </form>
                    <a href="{% url 'register' %}" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-full shadow-lg shadow-blue-500/30 transition-all transform hover:-translate-y-1">Join Now</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-10">
        {% block content %}{% endblock %}
    </main>

    <script>
        const themeToggleBtn = document.getElementById('theme-toggle');
        const darkIcon = document.getElementById('theme-toggle-dark-icon');
        const lightIcon = document.getElementById('theme-toggle-light-icon');

        // Icons toggle karne ka logic
        function updateIcons() {
            if (document.documentElement.classList.contains('dark')) {
                darkIcon.classList.remove('hidden');
                lightIcon.classList.add('hidden');
            } else {
                darkIcon.classList.add('hidden');
                lightIcon.classList.remove('hidden');
            }
        }
        updateIcons();

        themeToggleBtn.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            if (document.documentElement.classList.contains('dark')) {
                localStorage.theme = 'dark';
            } else {
                localStorage.theme = 'light';
            }
            updateIcons();
        });
    </script>
</body>
</html>
