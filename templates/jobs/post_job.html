{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div data-aos="fade-up" class="max-w-xl mx-auto ...">
    </div>
<div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-lg border border-gray-100">
    <h2 class="text-3xl font-bold text-gray-800 mb-6">Post a New Job</h2>
    <form method="POST">
        {% csrf_token %}
        {{ form|crispy }}
        <button type="submit" class="w-full bg-green-600 text-white font-bold py-3 rounded-lg hover:bg-green-700 transition shadow-md mt-4">
            Publish Job Listing
        </button>
    </form>
</div>
{% endblock %}
