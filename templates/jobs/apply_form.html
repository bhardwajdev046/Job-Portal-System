{% extends 'base.html' %}
{% block content %}
<div class="max-w-xl mx-auto bg-white dark:bg-slate-800 p-8 rounded-3xl shadow-2xl border border-slate-200 dark:border-slate-700">
    <h2 class="text-3xl font-bold dark:text-white mb-2">Apply for {{ job.title }}</h2>
    <p class="text-slate-500 mb-8">{{ job.company_name }}</p>

    <form method="POST" enctype="multipart/form-data" class="space-y-6">
        {% csrf_token %}
        
        <div>
            <label class="block text-sm font-medium dark:text-slate-200 mb-2">Upload Resume (PDF)</label>
            <input type="file" name="resume" required class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 dark:file:bg-slate-700 dark:file:text-slate-200">
        </div>

        <div>
            <label class="block text-sm font-medium dark:text-slate-200 mb-2">Cover Letter (Optional)</label>
            <textarea name="cover_letter" rows="4" class="w-full p-4 rounded-xl border border-slate-200 dark:border-slate-700 dark:bg-slate-900 focus:ring-2 focus:ring-blue-500 outline-none transition-all"></textarea>
        </div>

        <button type="submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition-all shadow-lg shadow-blue-500/25">
            Submit Application
        </button>
    </form>
</div>
{% endblock %}
